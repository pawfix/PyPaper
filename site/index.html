<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>PyWebView Input Example</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header>
            <div class="headBtn" id="download">
                <h3>Download</h3>
            </div>
            <div class="headBtn" id="local">
                <h3>Local</h3>
            </div>
        </header>

        <main id="main">
            <section class="download">
                <input type="text" id="userInput" placeholder="Type something..." />
                <div class="controls">
                    <details class="filters">
                        <summary>Filters</summary>

                        <div class="filters-content">
                            <input type="text" id="apiKey" placeholder="Enter your API key">

                            <input type="text" id="saveDir" placeholder="Save directory (default: ~/Images)" value="~/Images">

                            <select id="purity">
                                <option value="100">SFW</option>
                                <option value="110">Sketchy</option>
                                <option value="111">NSFW</option>
                            </select>
                            <select name="handler" id="handler">
                                <option value="swww">SWWW</option>
                                <option value="awww">AWWW</option>
                                <option value="swaybg">swaybg</option>
                                <option value="hyprpaper">hyprpaper</option>
                                <option value="wpaperd">wpaperd</option>
                            </select>
                            <label for="remember" id="rememberLabel">
                                <input type="checkbox" name="remember" id="remember" />
                                Remember your choices?
                            </label>
                        </div>
                    </details>
                    <button id="sendBtn">Send to Python</button>
                </div>

                <div class="container" id="container"></div>
                <div class="action-buttons" id="downloadActionButtons"></div>
            </section>

            <section class="local">
                <input type="text" name="fileDir" id="localFileDir" placeholder="Enter your wallpaper dir (default: ~/Images)" value="~/Images/">
                <div class="controls">
                    <details class="filters">
                        <summary>Filters</summary>
                        <div class="filters-content">
                            <select name="localHandler" id="localHandler">
                                <option value="swww">SWWW</option>
                                <option value="awww">AWWW</option>
                                <option value="swaybg">swaybg</option>
                                <option value="hyprpaper">hyprpaper</option>
                                <option value="wpaperd">wpaperd</option>
                            </select>
                        </div>
                    </details>
                    <button id="localFileBtn">Get local wallpapers</button>
                </div>
                <div class="container" id="localContainer"></div>
                <div class="action-buttons" id="localActionButtons"></div>
            </section>
        </main>

        <script src="scrpit.js"></script>

    </body>
</html>
